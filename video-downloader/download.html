<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视频一键下载</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b1020;color:#eaf0ff;font-family:"Microsoft YaHei UI",sans-serif}
    .box{width:min(700px,92vw);background:#131a2e;border:1px solid #2a3559;border-radius:14px;padding:20px}
    h2{margin:0 0 10px}
    p{margin:0 0 12px;color:#9fb0d8}
    input,button{width:100%;padding:12px;border-radius:10px;border:1px solid #33426d;background:#0f1528;color:#fff}
    button{margin-top:10px;background:#55e6a5;color:#042312;border:none;font-weight:700;cursor:pointer}
    a{color:#49c9ff}
    #msg{margin-top:12px;color:#9fb0d8;line-height:1.6}
  </style>
</head>
<body>
  <div class="box">
    <h2>视频一键下载</h2>
    <p>粘贴视频链接，系统会后台下载，完成后自动触发浏览器保存。</p>
    <input id="url" type="url" placeholder="粘贴视频链接（YouTube / B站 / X 等）" />
    <button id="go">开始下载</button>
    <div id="msg"></div>
  </div>

  <script>
    const api = "https://urban-container-aircraft-share.trycloudflare.com/webhook/video-download";
    const msg = document.getElementById("msg");
    const btn = document.getElementById("go");

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    btn.onclick = async () => {
      const u = document.getElementById("url").value.trim();
      if (!u) return alert("请先粘贴视频链接");

      btn.disabled = true;
      msg.textContent = "步骤1/3：已提交下载任务...";

      try {
        const jobRes = await fetch(api + "?url=" + encodeURIComponent(u));
        const job = await jobRes.json();

        if (!job.statusUrl || !job.downloadUrl) {
          throw new Error("后端没有返回 statusUrl/downloadUrl");
        }

        msg.innerHTML = "步骤2/3：后台下载中，正在轮询状态...";

        let ready = false;
        for (let i = 0; i < 120; i++) {
          const stRes = await fetch(job.statusUrl);
          const st = await stRes.json();
          if (st.ready === true) {
            ready = true;
            break;
          }
          msg.innerHTML = `步骤2/3：下载中（已等待 ${i * 3} 秒）...`;
          await sleep(3000);
        }

        if (!ready) throw new Error("等待超时（下载时间过长）");

        msg.innerHTML = `步骤3/3：下载完成，正在触发浏览器下载...<br><a href="${job.downloadUrl}">如果未自动下载，点这里手动下载</a>`;
        window.location.href = job.downloadUrl;
      } catch (e) {
        msg.textContent = "失败：" + e.message;
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
